codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: "70...100"
  
  status:
    project:
      default:
        target: 80%
        threshold: 5%
        base: auto
        flags:
          - unittests
    patch:
      default:
        target: 70%
        threshold: 10%

flags:
  unittests:
    paths:
      - sparse_kappa/
    carryforward: true
  gpu-tests:
    paths:
      - sparse_kappa/
    carryforward: true

ignore:
  - "tests/"
  - "examples/"
  - "setup.py"
  - "**/__init__.py"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: no
  require_base: no
  require_head: yes
